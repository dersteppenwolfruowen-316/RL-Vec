base_model: Qwen/Qwen2.5-VL-3B-Instruct

lora:
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization: null  # null, 4bit, or 8bit

use_flash_attention: false

torch_dtype: bfloat16

device_map: auto
